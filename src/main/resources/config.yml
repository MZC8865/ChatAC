anti-spam:
  delay-ms: 20
  # 相似度检测配置
  similarity-check: true          # 是否启用相似度检测
  similarity-threshold: 0.8       # 相似度阈值（0.0-1.0，0.8表示80%相似）
  min-length-for-check: 3         # 最小检测长度（消息长度小于此值不检测相似度）
  
  # 违规词过滤配置
  profanity-filter: true          # 是否启用违规词过滤
  blocked-words:                  # 违规词列表（支持中英文）
    - "傻逼"
    - "fuck"
    - "shit"
    - "草泥马"
    - "sb"
    - "nmsl"
    # 添加更多违规词...
  
  # 私信检测配置
  whisper-check: true             # 是否对私信进行检测（true=检测私信，false=不检测私信）
  
  # 消息间隔模式检测配置
  interval-check: true            # 是否启用间隔模式检测（检测机器人刷屏）
  
  # 自动禁言配置
  auto-mute:
    enabled: true                 # 是否启用自动禁言
    violations-per-minute: 5      # 每分钟违规次数阈值
    mute-duration: 300            # 禁言时长（秒），默认5分钟
